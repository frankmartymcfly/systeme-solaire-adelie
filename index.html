<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Système Solaire d'Adélie ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #0a0e27;
    --sun-gold: #FFD93D;
    --sun-orange: #FF8C00;
    --star-white: #f0f0ff;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka', sans-serif;
    background: var(--space);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--star-white);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Header */
  .header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(135deg, #FFD93D, #FF8C00, #FF6B6B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 1px;
    animation: titleFloat 3s ease-in-out infinite;
  }

  .header p {
    font-size: clamp(0.9rem, 2.5vw, 1.15rem);
    color: rgba(255,255,255,0.6);
    margin-top: 0.3rem;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Solar system container */
  .solar-system {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 0.5rem;
    gap: 0;
    flex-wrap: nowrap;
    overflow-x: auto;
    min-height: 320px;
  }

  /* Sun */
  .sun {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFF7AE, #FFD93D 40%, #FF8C00 75%, #CC5500);
    box-shadow:
      0 0 30px rgba(255,200,0,0.6),
      0 0 60px rgba(255,140,0,0.3),
      0 0 100px rgba(255,100,0,0.15);
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    animation: sunPulse 4s ease-in-out infinite;
    position: relative;
  }

  .sun:hover {
    transform: scale(1.15);
    box-shadow:
      0 0 40px rgba(255,200,0,0.8),
      0 0 80px rgba(255,140,0,0.5),
      0 0 120px rgba(255,100,0,0.25);
  }

  .sun.active {
    transform: scale(1.2);
  }

  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,200,0,0.6), 0 0 60px rgba(255,140,0,0.3); }
    50% { box-shadow: 0 0 45px rgba(255,200,0,0.8), 0 0 90px rgba(255,140,0,0.4); }
  }

  /* Planet wrapper */
  .planet-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.3s;
    flex-shrink: 0;
    padding: 0 clamp(4px, 1vw, 12px);
  }

  .planet-wrapper:hover {
    transform: translateY(-8px);
  }

  .planet-wrapper:hover .planet {
    box-shadow: 0 0 20px var(--glow-color, rgba(255,255,255,0.4));
  }

  .planet-wrapper.active .planet {
    box-shadow: 0 0 25px var(--glow-color, rgba(255,255,255,0.5));
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .planet {
    border-radius: 50%;
    transition: box-shadow 0.3s, transform 0.3s;
    position: relative;
    min-width: 12px;
    min-height: 12px;
  }

  /* Invisible touch target for small planets */
  .planet::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
  }

  /* Subtle halo for tiny planets so they're easier to spot */
  .planet-wrapper[data-tiny="true"] .planet::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--glow-color, rgba(255,255,255,0.08));
    opacity: 0.3;
    pointer-events: none;
  }

  .planet-name {
    font-size: clamp(0.55rem, 1.5vw, 0.75rem);
    font-weight: 600;
    margin-top: 6px;
    opacity: 0.7;
    transition: opacity 0.3s;
    text-align: center;
    white-space: nowrap;
  }

  .planet-wrapper:hover .planet-name,
  .planet-wrapper.active .planet-name {
    opacity: 1;
  }

  /* Saturn ring */
  .saturn-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(65deg);
    width: 180%;
    height: 180%;
    border: 3px solid rgba(210,180,140,0.5);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Info card */
  .info-card {
    position: relative;
    z-index: 3;
    max-width: 500px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
    min-height: 260px;
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 1.5rem 1.8rem;
    transition: all 0.4s ease;
    animation: cardIn 0.5s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .card-emoji {
    font-size: 2.2rem;
    line-height: 1;
  }

  .card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .card-subtitle {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
  }

  .card-body {
    font-size: 1rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
  }

  .fun-fact {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    border-left: 3px solid var(--accent, #FFD93D);
    font-size: 0.9rem;
  }

  .fun-fact-label {
    font-weight: 700;
    color: var(--accent, #FFD93D);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .stats {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .stat {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 0.5rem 0.8rem;
    text-align: center;
    flex: 1;
    min-width: 80px;
  }

  .stat-value {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent, #FFD93D);
  }

  .stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Default prompt */
  .prompt-card {
    text-align: center;
    padding: 2.5rem 1.5rem;
  }

  .prompt-card .prompt-emoji {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.8rem;
    animation: pointUp 1.5s ease-in-out infinite;
  }

  @keyframes pointUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .prompt-card p {
    font-size: 1.15rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .solar-system { padding: 1rem 0.3rem; min-height: 260px; }
    .sun { width: 70px; height: 70px; }
    .card { padding: 1.2rem; }
    .stats { gap: 0.5rem; }
  }

  /* Shooting star */
  .shooting-star {
    position: fixed;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
  }

  .shooting-star::after {
    content: '';
    position: absolute;
    width: 80px;
    height: 1px;
    background: linear-gradient(to left, white, transparent);
    top: 50%;
    right: 100%;
    transform: translateY(-50%);
  }

  @keyframes shoot {
    0% { opacity: 0; transform: translate(0, 0); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translate(-400px, 200px); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="header">
  <h1>🚀 Le Système Solaire</h1>
  <p>Clique sur une planète pour la découvrir !</p>
  <p style="font-size: clamp(0.65rem, 1.8vw, 0.8rem); color: rgba(255,255,255,0.35); margin-top: 0.3rem;">Les tailles des planètes sont proportionnelles entre elles ✨ (le Soleil est réduit !)</p>
</div>

<div class="solar-system" id="solarSystem"></div>

<div class="info-card" id="infoCard">
  <div class="card prompt-card">
    <span class="prompt-emoji">👆</span>
    <p>Choisis le Soleil ou une planète<br>pour apprendre des choses super cool !</p>
  </div>
</div>

<script>
const bodies = [
  {
    name: "Soleil",
    nameFr: "Le Soleil",
    emoji: "☀️",
    subtitle: "Notre étoile",
    isSun: true,
    accent: "#FFD93D",
    desc: "Le Soleil est une énorme boule de feu ! C'est une étoile qui nous donne de la lumière et de la chaleur. Sans lui, il ferait tout noir et très très froid sur la Terre.",
    funFact: "Le Soleil est tellement gros qu'on pourrait mettre un million de Terres dedans !",
    stats: [
      { value: "4.6 G", label: "Milliards d'années" },
      { value: "5 500°C", label: "Surface" },
      { value: "⭐", label: "Étoile" }
    ]
  },
  {
    name: "Mercure",
    emoji: "🪨",
    subtitle: "La plus rapide",
    size: 3,
    color: "radial-gradient(circle at 35% 35%, #b8b8b8, #8a8a8a 60%, #5a5a5a)",
    glow: "rgba(180,180,180,0.4)",
    accent: "#b8b8b8",
    desc: "Mercure est la planète la plus proche du Soleil et la plus petite ! Elle fait le tour du Soleil très vite — en seulement 88 jours. C'est la championne de la course !",
    funFact: "Sur Mercure, le jour c'est brûlant (430°C) et la nuit c'est glacial (-180°C). Brrr et Aïe en même temps !",
    stats: [
      { value: "88", label: "Jours/an" },
      { value: "4 880 km", label: "Diamètre" },
      { value: "0", label: "Lunes" }
    ]
  },
  {
    name: "Vénus",
    emoji: "🌟",
    subtitle: "La plus chaude",
    size: 7,
    color: "radial-gradient(circle at 35% 35%, #ffe4b5, #e8b86d 50%, #c4853d)",
    glow: "rgba(232,184,109,0.4)",
    accent: "#e8b86d",
    desc: "Vénus est la planète la plus chaude de tout le système solaire ! Elle est couverte de nuages épais qui gardent toute la chaleur. On peut la voir briller le soir dans le ciel — on l'appelle l'étoile du berger !",
    funFact: "Vénus tourne à l'envers ! Le Soleil se lève à l'ouest et se couche à l'est là-bas. Bizarre, hein ?",
    stats: [
      { value: "465°C", label: "Température" },
      { value: "12 104 km", label: "Diamètre" },
      { value: "0", label: "Lunes" }
    ]
  },
  {
    name: "Terre",
    emoji: "🌍",
    subtitle: "Notre maison !",
    size: 7,
    color: "radial-gradient(circle at 35% 35%, #7EC8E3, #4B9CD3 40%, #2E7D32 65%, #1B5E20)",
    glow: "rgba(78,200,227,0.4)",
    accent: "#7EC8E3",
    desc: "C'est ici qu'on habite ! La Terre est la seule planète qu'on connaît avec de l'eau, des arbres, des animaux... et des chats ! C'est notre belle maison bleue dans l'espace.",
    funFact: "Vue de l'espace, la Terre est surtout bleue parce qu'elle est recouverte de beaucoup, beaucoup d'eau. C'est pour ça qu'on l'appelle la planète bleue !",
    stats: [
      { value: "365", label: "Jours/an" },
      { value: "12 742 km", label: "Diamètre" },
      { value: "1 🌙", label: "Lune" }
    ]
  },
  {
    name: "Mars",
    emoji: "🔴",
    subtitle: "La planète rouge",
    size: 4,
    color: "radial-gradient(circle at 35% 35%, #e8a87c, #c1440e 55%, #8b2500)",
    glow: "rgba(193,68,14,0.4)",
    accent: "#e8a87c",
    desc: "Mars est rouge à cause de la rouille ! Oui oui, comme quand du métal rouille dehors. Mars a aussi le plus grand volcan du système solaire, le mont Olympus — trois fois plus haut que le mont Everest !",
    funFact: "On a envoyé des petits robots sur Mars pour explorer. Ils s'appellent des rovers. Un s'appelle Perseverance !",
    stats: [
      { value: "687", label: "Jours/an" },
      { value: "6 779 km", label: "Diamètre" },
      { value: "2", label: "Lunes" }
    ]
  },
  {
    name: "Jupiter",
    emoji: "🟤",
    subtitle: "La géante",
    size: 80,
    color: "radial-gradient(circle at 35% 35%, #f5deb3, #d4a76a 30%, #c4853d 50%, #a0522d 70%, #d4a76a 85%)",
    glow: "rgba(212,167,106,0.4)",
    accent: "#d4a76a",
    stripes: true,
    desc: "Jupiter est la plus grosse planète ! Elle est tellement grande que toutes les autres planètes pourraient rentrer dedans. Elle a une grosse tache rouge qui est en fait une tempête géante qui dure depuis des centaines d'années !",
    funFact: "Jupiter a au moins 95 lunes ! C'est comme avoir 95 petites sœurs et petits frères qui tournent autour de toi.",
    stats: [
      { value: "12", label: "Années/tour" },
      { value: "139 820 km", label: "Diamètre" },
      { value: "95+", label: "Lunes" }
    ]
  },
  {
    name: "Saturne",
    emoji: "💍",
    subtitle: "La belle aux anneaux",
    size: 67,
    color: "radial-gradient(circle at 35% 35%, #f5e6c8, #e8c97c 45%, #d4a745 75%)",
    glow: "rgba(232,201,124,0.4)",
    accent: "#e8c97c",
    hasRing: true,
    desc: "Saturne est célèbre pour ses magnifiques anneaux ! Ces anneaux sont faits de milliards de morceaux de glace et de roche qui tournent autour d'elle. C'est la plus belle planète !",
    funFact: "Saturne est tellement légère qu'elle flotterait dans une baignoire géante ! (Si on pouvait trouver une baignoire assez grande...)",
    stats: [
      { value: "29", label: "Années/tour" },
      { value: "116 460 km", label: "Diamètre" },
      { value: "146+", label: "Lunes" }
    ]
  },
  {
    name: "Uranus",
    emoji: "🧊",
    subtitle: "La couchée",
    size: 29,
    color: "radial-gradient(circle at 35% 35%, #b8e8e8, #72c4c4 50%, #4a9a9a)",
    glow: "rgba(114,196,196,0.4)",
    accent: "#72c4c4",
    desc: "Uranus est une géante de glace qui tourne couchée sur le côté, comme si elle roulait autour du Soleil au lieu de tourner debout ! Elle est bleu-vert à cause du gaz dans son atmosphère.",
    funFact: "Uranus est tellement penchée qu'un de ses pôles pointe directement vers le Soleil pendant 42 ans, puis c'est l'autre pôle qui prend la relève !",
    stats: [
      { value: "84", label: "Années/tour" },
      { value: "50 724 km", label: "Diamètre" },
      { value: "28", label: "Lunes" }
    ]
  },
  {
    name: "Neptune",
    emoji: "🔵",
    subtitle: "La mystérieuse",
    size: 28,
    color: "radial-gradient(circle at 35% 35%, #6e9eff, #3a6fd8 50%, #1a3fa0)",
    glow: "rgba(58,111,216,0.4)",
    accent: "#3a6fd8",
    desc: "Neptune est la planète la plus éloignée du Soleil. Elle est d'un bleu magnifique ! C'est aussi la planète des vents les plus forts — plus de 2 000 km/h ! Aucun ouragan sur Terre ne peut rivaliser.",
    funFact: "Neptune est tellement loin que la lumière du Soleil met 4 heures pour y arriver. Ici, ça prend seulement 8 minutes !",
    stats: [
      { value: "165", label: "Années/tour" },
      { value: "49 244 km", label: "Diamètre" },
      { value: "16", label: "Lunes" }
    ]
  }
];

// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 100}%;
    animation: twinkle ${2 + Math.random() * 4}s ease-in-out infinite;
    animation-delay: ${Math.random() * 5}s;
    opacity: ${0.3 + Math.random() * 0.7};
  `;
  starsEl.appendChild(s);
}

// Shooting stars
function launchShootingStar() {
  const star = document.createElement('div');
  star.className = 'shooting-star';
  star.style.top = Math.random() * 40 + '%';
  star.style.left = (40 + Math.random() * 60) + '%';
  star.style.animation = `shoot ${0.8 + Math.random() * 0.5}s linear forwards`;
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1500);
  setTimeout(launchShootingStar, 4000 + Math.random() * 8000);
}
setTimeout(launchShootingStar, 2000);

// Build solar system
const solarSystem = document.getElementById('solarSystem');

bodies.forEach((body, i) => {
  if (body.isSun) {
    const sun = document.createElement('div');
    sun.className = 'sun';
    sun.title = 'Le Soleil';
    sun.addEventListener('click', () => selectBody(i, sun));
    solarSystem.appendChild(sun);
  } else {
    const wrapper = document.createElement('div');
    wrapper.className = 'planet-wrapper';
    wrapper.style.setProperty('--glow-color', body.glow);
    if (body.size < 10) wrapper.dataset.tiny = 'true';

    const planet = document.createElement('div');
    planet.className = 'planet';
    planet.style.width = body.size + 'px';
    planet.style.height = body.size + 'px';
    planet.style.background = body.color;

    if (body.hasRing) {
      const ring = document.createElement('div');
      ring.className = 'saturn-ring';
      planet.style.position = 'relative';
      planet.appendChild(ring);
    }

    if (body.stripes) {
      planet.style.backgroundImage = `
        ${body.color},
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 4px,
          rgba(139,69,19,0.15) 4px,
          rgba(139,69,19,0.15) 6px
        )
      `;
    }

    const name = document.createElement('div');
    name.className = 'planet-name';
    name.textContent = body.name;

    wrapper.appendChild(planet);
    wrapper.appendChild(name);
    wrapper.addEventListener('click', () => selectBody(i, wrapper));
    solarSystem.appendChild(wrapper);
  }
});

let activeEl = null;

function selectBody(index, element) {
  // Remove active class from previous
  if (activeEl) activeEl.classList.remove('active');
  element.classList.add('active');
  activeEl = element;

  const body = bodies[index];
  const card = document.getElementById('infoCard');

  const statsHTML = body.stats.map(s => `
    <div class="stat">
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card" style="--accent: ${body.accent}">
      <div class="card-header">
        <span class="card-emoji">${body.emoji}</span>
        <div>
          <div class="card-title">${body.nameFr || body.name}</div>
          <div class="card-subtitle">${body.subtitle}</div>
        </div>
      </div>
      <div class="card-body">${body.desc}</div>
      <div class="fun-fact">
        <div class="fun-fact-label">🤩 Le savais-tu ?</div>
        ${body.funFact}
      </div>
      <div class="stats">${statsHTML}</div>
    </div>
  `;
}
</script>
</body>
</html>
