<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Système Solaire d'Adélie ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #0a0e27;
    --sun-gold: #FFD93D;
    --sun-orange: #FF8C00;
    --star-white: #f0f0ff;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka', sans-serif;
    background: var(--space);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: var(--star-white); }

  @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .header { position: relative; z-index: 2; text-align: center; padding: 2rem 1rem 0.5rem; }

  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(135deg, #FFD93D, #FF8C00, #FF6B6B);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 1px;
    animation: titleFloat 3s ease-in-out infinite;
  }

  .header p { font-size: clamp(0.9rem, 2.5vw, 1.15rem); color: rgba(255,255,255,0.6); margin-top: 0.3rem; }

  @keyframes titleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .mode-toggle {
    position: relative; z-index: 2;
    display: flex; justify-content: center; gap: 8px;
    padding: 0.8rem 1rem 0.3rem;
  }

  .mode-btn {
    font-family: 'Fredoka', sans-serif; font-size: clamp(0.8rem, 2vw, 0.95rem);
    font-weight: 600; padding: 0.5rem 1.2rem; border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s;
  }

  .mode-btn.active { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.4); color: #FFD93D; }
  .mode-btn:hover { border-color: rgba(255,255,255,0.3); }

  .voice-toggle {
    font-family: 'Fredoka', sans-serif; font-size: clamp(0.8rem, 2vw, 0.95rem);
    font-weight: 600; padding: 0.5rem 1rem; border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; gap: 5px;
  }

  .voice-toggle.active { background: rgba(100,200,255,0.15); border-color: rgba(100,200,255,0.4); color: #64C8FF; }
  .voice-toggle:hover { border-color: rgba(255,255,255,0.3); }

  .voice-icon { font-size: 1.1rem; }

  .solar-system {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem 0.5rem; gap: 0;
    flex-wrap: nowrap; overflow-x: auto; min-height: 320px;
  }

  .sun {
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFF7AE, #FFD93D 40%, #FF8C00 75%, #CC5500);
    box-shadow: 0 0 30px rgba(255,200,0,0.6), 0 0 60px rgba(255,140,0,0.3), 0 0 100px rgba(255,100,0,0.15);
    flex-shrink: 0; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
    animation: sunPulse 4s ease-in-out infinite;
  }

  .sun:hover { transform: scale(1.15); box-shadow: 0 0 40px rgba(255,200,0,0.8), 0 0 80px rgba(255,140,0,0.5), 0 0 120px rgba(255,100,0,0.25); }
  .sun.active { transform: scale(1.2); }

  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,200,0,0.6), 0 0 60px rgba(255,140,0,0.3); }
    50% { box-shadow: 0 0 45px rgba(255,200,0,0.8), 0 0 90px rgba(255,140,0,0.4); }
  }

  .planet-wrapper {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: transform 0.3s;
    flex-shrink: 0; padding: 0 clamp(4px, 1vw, 12px);
  }

  .planet-wrapper:hover { transform: translateY(-8px); }
  .planet-wrapper:hover .planet { box-shadow: 0 0 20px var(--glow-color, rgba(255,255,255,0.4)); }

  .planet-wrapper.active .planet {
    box-shadow: 0 0 25px var(--glow-color, rgba(255,255,255,0.5));
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0% { transform: scale(1); } 40% { transform: scale(1.25); }
    70% { transform: scale(0.95); } 100% { transform: scale(1); }
  }

  .planet {
    border-radius: 50%; transition: box-shadow 0.3s, transform 0.3s;
    position: relative; min-width: 3px; min-height: 3px;
  }

  .planet::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 44px; height: 44px; border-radius: 50%;
  }

  .planet-wrapper[data-tiny="true"] .planet::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 20px; height: 20px;
    border-radius: 50%; background: var(--glow-color, rgba(255,255,255,0.08));
    opacity: 0.3; pointer-events: none;
  }

  .planet-name {
    font-size: clamp(0.55rem, 1.5vw, 0.75rem); font-weight: 600;
    margin-top: 6px; opacity: 0.7; transition: opacity 0.3s;
    text-align: center; white-space: nowrap;
  }

  .planet-wrapper:hover .planet-name, .planet-wrapper.active .planet-name { opacity: 1; }

  .saturn-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotateX(65deg);
    width: 180%; height: 180%; border: 3px solid rgba(210,180,140,0.5);
    border-radius: 50%; pointer-events: none;
  }

  .info-card {
    position: relative; z-index: 3; max-width: 500px;
    margin: 0 auto 2rem; padding: 0 1rem; min-height: 260px;
  }

  .card {
    background: var(--card-bg); backdrop-filter: blur(20px);
    border: 1px solid var(--card-border); border-radius: 24px;
    padding: 1.5rem 1.8rem; transition: all 0.4s ease; animation: cardIn 0.5s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .card-emoji { font-size: 2.2rem; line-height: 1; }
  .card-title { font-family: 'Baloo 2', cursive; font-size: 1.6rem; font-weight: 700; }
  .card-subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.45); font-weight: 400; }
  .card-body { font-size: 1rem; line-height: 1.65; color: rgba(255,255,255,0.85); font-weight: 400; }

  .fun-fact {
    margin-top: 1rem; padding: 0.8rem 1rem;
    background: rgba(255,255,255,0.05); border-radius: 14px;
    border-left: 3px solid var(--accent, #FFD93D); font-size: 0.9rem;
  }

  .fun-fact-label {
    font-weight: 700; color: var(--accent, #FFD93D);
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 4px;
  }

  .tap-hint {
    text-align: center; margin-top: 0.6rem;
    font-size: 0.7rem; color: rgba(255,255,255,0.25);
  }

  .stats { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }

  .stat {
    background: rgba(255,255,255,0.04); border-radius: 12px;
    padding: 0.5rem 0.8rem; text-align: center; flex: 1; min-width: 80px;
  }

  .stat-value { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; color: var(--accent, #FFD93D); }
  .stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1px; }

  .prompt-card { text-align: center; padding: 2.5rem 1.5rem; }
  .prompt-card .prompt-emoji { font-size: 3rem; display: block; margin-bottom: 0.8rem; animation: pointUp 1.5s ease-in-out infinite; }

  @keyframes pointUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .prompt-card p { font-size: 1.15rem; color: rgba(255,255,255,0.6); line-height: 1.6; }

  .quiz-question { font-family: 'Baloo 2', cursive; font-size: clamp(1.1rem, 3vw, 1.4rem); text-align: center; margin-bottom: 1.2rem; line-height: 1.4; }
  .quiz-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .quiz-btn {
    font-family: 'Fredoka', sans-serif; font-size: clamp(0.9rem, 2.5vw, 1.05rem);
    font-weight: 600; padding: 0.9rem 0.6rem; border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.85); cursor: pointer; transition: all 0.25s;
    text-align: center; line-height: 1.3; min-height: 60px;
    display: flex; align-items: center; justify-content: center;
  }

  .quiz-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); transform: scale(1.03); }
  .quiz-btn:active { transform: scale(0.97); }

  .quiz-btn.correct { background: rgba(76,175,80,0.25); border-color: rgba(76,175,80,0.6); color: #81C784; animation: correctPop 0.5s ease; }
  .quiz-btn.wrong { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }

  @keyframes correctPop { 0% { transform: scale(1); } 30% { transform: scale(1.08); } 100% { transform: scale(1); } }

  .quiz-feedback { text-align: center; margin-top: 1rem; font-size: 1.1rem; font-weight: 600; min-height: 2.5rem; }
  .quiz-feedback.success { color: #81C784; }
  .quiz-feedback.encourage { color: #FFD93D; }

  .quiz-next {
    font-family: 'Fredoka', sans-serif; font-size: 1rem; font-weight: 600;
    margin-top: 0.8rem; padding: 0.6rem 1.5rem; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #FFD93D, #FF8C00);
    color: #1a1a2e; cursor: pointer; transition: all 0.3s; display: none;
  }

  .quiz-next:hover { transform: scale(1.05); filter: brightness(1.1); }
  .quiz-next.visible { display: inline-block; }

  .quiz-score { text-align: center; padding: 0.6rem 0 0; }
  .quiz-score-text { font-size: 0.85rem; color: rgba(255,255,255,0.4); }
  .quiz-stars { font-size: 1.4rem; letter-spacing: 4px; margin-top: 4px; }

  .celebration {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background: rgba(10,14,39,0.85); backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }

  .celebration.active { opacity: 1; pointer-events: auto; }
  .celebration-emoji { font-size: 4rem; animation: celebBounce 0.8s ease infinite; }

  @keyframes celebBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.1); } }

  .celebration-text {
    font-family: 'Baloo 2', cursive; font-size: clamp(1.5rem, 4vw, 2rem); margin-top: 1rem;
    background: linear-gradient(135deg, #FFD93D, #FF6B6B);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .celebration-sub { font-size: 1rem; color: rgba(255,255,255,0.6); margin-top: 0.5rem; }

  .celebration-btns { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }

  .celebration-btn {
    font-family: 'Fredoka', sans-serif; font-size: 1rem; font-weight: 600;
    padding: 0.7rem 1.5rem; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #FFD93D, #FF8C00);
    color: #1a1a2e; cursor: pointer; transition: all 0.3s;
  }

  .celebration-btn:hover { transform: scale(1.05); }
  .celebration-btn.secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.15); }

  .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 101; pointer-events: none; border-radius: 2px; }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  @media (max-width: 600px) {
    .solar-system { padding: 1rem 0.3rem; min-height: 260px; }
    .sun { width: 70px; height: 70px; }
    .card { padding: 1.2rem; }
    .stats { gap: 0.5rem; }
    .quiz-answers { gap: 8px; }
    .quiz-btn { padding: 0.7rem 0.5rem; min-height: 50px; }
  }

  .shooting-star {
    position: fixed; width: 3px; height: 3px; background: white;
    border-radius: 50%; z-index: 1; pointer-events: none; opacity: 0;
  }

  .shooting-star::after {
    content: ''; position: absolute; width: 80px; height: 1px;
    background: linear-gradient(to left, white, transparent);
    top: 50%; right: 100%; transform: translateY(-50%);
  }

  @keyframes shoot {
    0% { opacity: 0; transform: translate(0,0); }
    10% { opacity: 1; } 90% { opacity: 1; }
    100% { opacity: 0; transform: translate(-400px, 200px); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="header">
  <h1>🚀 Le Système Solaire</h1>
  <p id="headerSub">Clique sur une planète pour la découvrir !</p>
  <p style="font-size: clamp(0.65rem, 1.8vw, 0.8rem); color: rgba(255,255,255,0.35); margin-top: 0.3rem;">Les tailles des planètes sont proportionnelles entre elles ✨ (le Soleil est réduit !)</p>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="btnExplore" onclick="setMode('explore')">🔭 Explorer</button>
  <button class="mode-btn" id="btnQuiz" onclick="setMode('quiz')">🧠 Quiz</button>
  <button class="voice-toggle" id="btnVoice" onclick="toggleVoice()">
    <span class="voice-icon" id="voiceIcon">🔇</span> <span id="voiceLabel">Voix</span>
  </button>
</div>

<div class="solar-system" id="solarSystem"></div>

<div class="info-card" id="infoCard">
  <div class="card prompt-card">
    <span class="prompt-emoji">👆</span>
    <p>Choisis le Soleil ou une planète<br>pour apprendre des choses super cool !</p>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-emoji" id="celebEmoji">🏆🌟🚀</div>
  <div class="celebration-text" id="celebText">Bravo !</div>
  <div class="celebration-sub" id="celebSub"></div>
  <div class="celebration-btns">
    <button class="celebration-btn" onclick="closeCelebration('explore')">🔭 Explorer</button>
    <button class="celebration-btn secondary" onclick="closeCelebration('quiz')">🔄 Rejouer</button>
  </div>
</div>

<script>
// =====================================================
// PLANET DATA — rich descriptions + multiple fun facts
// =====================================================
const bodies = [
  {
    name: "Soleil", nameFr: "Le Soleil", emoji: "☀️",
    subtitle: "Notre étoile", isSun: true, accent: "#FFD93D",
    desc: "Le Soleil est une énorme boule de gaz brûlant ! C'est une étoile — la plus proche de nous. Il nous donne de la lumière pour voir et de la chaleur pour vivre. Sans lui, la Terre serait un gros glaçon perdu dans le noir. Le Soleil est né il y a environ 4 milliards et demi d'années, et il va encore briller pendant très, très longtemps !",
    funFacts: [
      "Le Soleil est tellement gros qu'on pourrait mettre un million de Terres dedans !",
      "La lumière du Soleil prend 8 minutes pour arriver jusqu'à nous. Quand tu vois le Soleil, tu le vois comme il était il y a 8 minutes !",
      "Le Soleil perd 4 millions de tonnes par seconde en fabriquant de la lumière. Mais il est tellement gros que ça ne change presque rien !",
      "Au centre du Soleil, il fait 15 millions de degrés ! C'est tellement chaud qu'on ne peut même pas l'imaginer.",
      "Le Soleil est fait surtout d'hydrogène et d'hélium — le même gaz qui fait flotter les ballons de fête !",
      "Le Soleil tourne sur lui-même, mais pas en un seul bloc : son milieu tourne plus vite que ses pôles !",
    ],
    stats: [{ value: "4.6 G", label: "Milliards d'années" }, { value: "5 500°C", label: "Surface" }, { value: "⭐", label: "Étoile" }]
  },
  {
    name: "Mercure", emoji: "🪨", subtitle: "La plus rapide",
    size: 3, color: "radial-gradient(circle at 35% 35%, #b8b8b8, #8a8a8a 60%, #5a5a5a)",
    glow: "rgba(180,180,180,0.4)", accent: "#b8b8b8",
    desc: "Mercure est la planète la plus proche du Soleil et la plus petite de toutes ! Elle fait le tour du Soleil super vite — en seulement 88 jours, c'est la championne de la course ! Mais elle tourne très lentement sur elle-même. Un seul jour sur Mercure dure 59 jours terrestres ! Imagine : tu attendrais presque deux mois pour voir un coucher de soleil.",
    funFacts: [

  {

    desc: "Vénus est la planète la plus chaude du système solaire — encore plus chaude que Mercure, qui est pourtant plus proche du Soleil ! C'est parce que ses nuages épais gardent toute la chaleur comme une grosse couverture. On peut souvent voir Vénus briller très fort le matin ou le soir — on l'appelle « l'étoile du berger », même si ce n'est pas une étoile !",

  {
    name: "Terre", emoji: "🌍", subtitle: "Notre maison !",

    funFacts: [

      "La Terre a un bouclier invisible qui la protège : le champ magnétique. Sans lui, le vent solaire emporterait notre atmosphère !",

    ],
    stats: [{ value: "365", label: "Jours/an" }, { value: "12 742 km", label: "Diamètre" }, { value: "1 🌙", label: "Lune" }]
  },
  {
    name: "Mars", emoji: "🔴", subtitle: "La planète rouge",

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// =====================================================
// SPEECH SYNTHESIS
// =====================================================
function initVoices() {
  const voices = speechSynthesis.getVoices();
  // Prefer a French voice, ideally female for storytelling feel
  frenchVoice = voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('amelie'))
    || voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('thomas'))
    || voices.find(v => v.lang.startsWith('fr') && !v.name.toLowerCase().includes('compact'))
    || voices.find(v => v.lang.startsWith('fr'))
    || null;
}

// Voices load async on some browsers
if (speechSynthesis.getVoices().length) initVoices();
speechSynthesis.addEventListener('voiceschanged', initVoices);

function speak(text) {
  if (!voiceEnabled || !text) return;
  speechSynthesis.cancel();
  // Strip emojis for cleaner speech
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FEFF}]|[\u200D]|[⭐☆⬡△⬜⭕❌✅⬅➡⬆🔄]/gu, '').replace(/\s+/g, ' ').trim();
  if (!clean) return;

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  if (frenchVoice) utter.voice = frenchVoice;
  utter.rate = 0.9;  // Slightly slower for a kid
  utter.pitch = 1.05;
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  speechSynthesis.cancel();
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('btnVoice');
  const icon = document.getElementById('voiceIcon');
  btn.classList.toggle('active', voiceEnabled);
  icon.textContent = voiceEnabled ? '🔊' : '🔇';

  if (!voiceEnabled) {
    stopSpeech();
  } else {
    // Quick test so user knows it works (also triggers iOS audio permission)
    speak("La voix est activée !");
  }
}

  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:twinkle ${2+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*5}s;opacity:${0.3+Math.random()*0.7};`;
  starsEl.appendChild(s);
}

function launchShootingStar() {
  const s = document.createElement('div');
  s.className = 'shooting-star';
  s.style.top = Math.random()*40+'%';
  s.style.left = (40+Math.random()*60)+'%';
  s.style.animation = `shoot ${0.8+Math.random()*0.5}s linear forwards`;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1500);
  setTimeout(launchShootingStar, 4000+Math.random()*8000);
}

const solarSystem = document.getElementById('solarSystem');
bodies.forEach((body, i) => {
  if (body.isSun) {
    const sun = document.createElement('div');
    sun.className = 'sun'; sun.title = 'Le Soleil';
    sun.addEventListener('click', () => selectBody(i, sun));
    solarSystem.appendChild(sun);
  } else {
    const w = document.createElement('div');
    w.className = 'planet-wrapper';
    w.style.setProperty('--glow-color', body.glow);
    if (body.size < 10) w.dataset.tiny = 'true';

    const p = document.createElement('div');
    p.className = 'planet';
    p.style.width = body.size+'px'; p.style.height = body.size+'px';
    p.style.background = body.color;

    if (body.hasRing) {
      const r = document.createElement('div');
      r.className = 'saturn-ring'; p.style.position = 'relative';
      p.appendChild(r);
    }
    if (body.stripes) {
      p.style.backgroundImage = `${body.color},repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(139,69,19,0.15) 4px,rgba(139,69,19,0.15) 6px)`;
    }

    const n = document.createElement('div');
    n.className = 'planet-name'; n.textContent = body.name;

    w.appendChild(p); w.appendChild(n);
    w.addEventListener('click', () => selectBody(i, w));
    solarSystem.appendChild(w);
  }
});

// =====================================================
// EXPLORE MODE
// =====================================================
let activeEl = null;

function selectBody(index, element) {
  if (mode !== 'explore') return;
  if (activeEl) activeEl.classList.remove('active');
  element.classList.add('active'); activeEl = element;

  const body = bodies[index];
  const fact = pick(body.funFacts);
  const card = document.getElementById('infoCard');

  card.innerHTML = `
    <div class="card" style="--accent: ${body.accent}">
      <div class="card-header">
        <span class="card-emoji">${body.emoji}</span>
        <div>
          <div class="card-title">${body.nameFr || body.name}</div>
          <div class="card-subtitle">${body.subtitle}</div>
        </div>
      </div>
      <div class="card-body">${body.desc}</div>
      <div class="fun-fact">
        <div class="fun-fact-label">🤩 Le savais-tu ?</div>
        ${fact}
      </div>
      <div class="stats">${body.stats.map(s => `
        <div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>
      `).join('')}</div>
      <div class="tap-hint">Reclique pour un autre fait amusant !</div>
    </div>`;

  // Speak the name, description, and fun fact
  speak(`${body.nameFr || body.name}. ${body.desc} ... Le savais-tu ? ${fact}`);
}

// =====================================================
// MODE SWITCHING
// =====================================================
function setMode(m) {
  mode = m;
  stopSpeech();
  document.getElementById('btnExplore').classList.toggle('active', m === 'explore');
  document.getElementById('btnQuiz').classList.toggle('active', m === 'quiz');
  if (activeEl) { activeEl.classList.remove('active'); activeEl = null; }

  if (m === 'explore') {
    document.getElementById('headerSub').textContent = 'Clique sur une planète pour la découvrir !';
    document.getElementById('infoCard').innerHTML = `
      <div class="card prompt-card">
        <span class="prompt-emoji">👆</span>
        <p>Choisis le Soleil ou une planète<br>pour apprendre des choses super cool !</p>
      </div>`;
  } else {
    document.getElementById('headerSub').textContent = 'Montre ce que tu sais !';
    startQuiz();
  }
}

// =====================================================
// QUIZ
// =====================================================
function startQuiz() {
  quizOrder = shuffle(allQuizQuestions).slice(0, QUESTIONS_PER_ROUND);
  quizIndex = 0; quizScore = 0;
  showQuestion();
}

function showQuestion() {
  if (quizIndex >= quizOrder.length) { finishQuiz(); return; }
  quizAnswered = false;
  const q = quizOrder[quizIndex];
  const stars = '⭐'.repeat(quizScore) + '☆'.repeat(quizIndex - quizScore);

  document.getElementById('infoCard').innerHTML = `
    <div class="card" style="--accent: #FFD93D">
      <div class="quiz-score">
        <div class="quiz-score-text">Question ${quizIndex+1} sur ${quizOrder.length}</div>
        ${quizIndex > 0 ? `<div class="quiz-stars">${stars}</div>` : ''}
      </div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-answers">
        ${q.answers.map((a, i) => `<button class="quiz-btn" onclick="answerQuiz(${i})" id="qbtn${i}">${a}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div style="text-align:center">
        <button class="quiz-next" id="quizNext" onclick="nextQuestion()">Prochaine question →</button>
      </div>
    </div>`;

  // Read the question aloud
  speak(q.q);
}

const successMsgs = [
  "🌟 Super ! Tu es une vraie astronaute !",
  "🚀 Génial ! Tu connais bien l'espace !",
  "⭐ Bravo ! C'est la bonne réponse !",
  "🎉 Parfait ! Tu es trop forte !",
  "🌟 Oui ! Excellente réponse !",
  "🪐 Wow ! Tu connais tes planètes !",
  "✨ Incroyable ! Tu as raison !",
  "🌙 Yes ! Tu es une experte de l'espace !",
  "🔭 Magnifique ! Bonne réponse !",
  "💫 Champion ! Tu as tout bon !",
];

const encourageMsgs = [
  "Presque ! La bonne réponse est en vert 💚",
  "Pas tout à fait ! Regarde en vert 💚",
  "Oh ! C'était difficile celle-là ! 💚",
  "Bonne tentative ! La réponse est en vert 💚",
  "Pas grave ! On apprend en essayant 💚",
  "C'était un piège ! Regarde la réponse en vert 💚",
];

function answerQuiz(choice) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizOrder[quizIndex];
  const feedback = document.getElementById('quizFeedback');
  const nextBtn = document.getElementById('quizNext');

  for (let i = 0; i < q.answers.length; i++) {
    document.getElementById('qbtn'+i).classList.add(i === q.correct ? 'correct' : 'wrong');
  }

  if (choice === q.correct) {
    quizScore++;
    feedback.className = 'quiz-feedback success';
    const msg = pick(successMsgs);
    feedback.textContent = msg;
    speak(msg);
  } else {
    feedback.className = 'quiz-feedback encourage';
    const msg = pick(encourageMsgs);
    feedback.textContent = msg;
    const correctAnswer = q.answers[q.correct].replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]/gu, '').trim();
    speak(msg + " C'était : " + correctAnswer);
  }

  nextBtn.classList.add('visible');
  if (quizIndex >= quizOrder.length - 1) nextBtn.textContent = "Voir mes étoiles ! ⭐";
}

function nextQuestion() { quizIndex++; showQuestion(); }

function finishQuiz() {
  const total = quizOrder.length;
  const pct = quizScore / total;
  let emoji, msg, sub;

  if (pct === 1) {
    emoji = "🏆🌟🚀"; msg = "PARFAIT ! Super astronaute !";
    sub = `${quizScore}/${total} — Toutes les bonnes réponses !`;
  } else if (pct >= 0.8) {
    emoji = "🌟🚀✨"; msg = "Bravo, c'est super !";
    sub = `${quizScore}/${total} étoiles — Tu connais bien l'espace !`;
  } else if (pct >= 0.5) {
    emoji = "🚀💪✨"; msg = "Beau travail !";
    sub = `${quizScore}/${total} étoiles — Tu apprends vite !`;
  } else {
    emoji = "🌟📚🚀"; msg = "Belle tentative !";
    sub = `${quizScore}/${total} étoiles — Explore les planètes et réessaie !`;
  }

  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebText').textContent = msg;
  document.getElementById('celebSub').textContent = sub;
  document.getElementById('celebration').classList.add('active');
  launchConfetti();
  speak(`${msg} ${sub}`);
}

function closeCelebration(nextMode) {
  stopSpeech();
  document.getElementById('celebration').classList.remove('active');
  setMode(nextMode || 'explore');
}

function launchConfetti() {
  const colors = ['#FFD93D','#FF6B6B','#4ECDC4','#A78BFA','#FF8C00','#81C784','#64B5F6'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%'; p.style.top = '-10px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width = (6+Math.random()*8)+'px'; p.style.height = (6+Math.random()*8)+'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animation = `confettiFall ${1.5+Math.random()*2}s ease-out forwards`;
    p.style.animationDelay = Math.random()*0.8+'s';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}
</script>
